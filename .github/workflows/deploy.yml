# Workflow para publicar conteúdo estático no GitHub Pages
name: Deploy static content to Pages

on:
  # Executa quando houver um push na branch principal
  push:
    branches: ["main"]
  # Permite executar manualmente pela aba "Actions"
  workflow_dispatch:

# Permissões para permitir o deploy no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite apenas uma execução por vez, evitando conflitos
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job de deploy
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # PASSO IMPORTANTE: Configura o Node.js 24 para eliminar o aviso
      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
      
      # Garante que o Jekyll não tente processar o site
      - name: Ensure .nojekyll exists
        run: |
          if [ ! -f .nojekyll ]; then
            touch .nojekyll
          fi
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
